<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

    #container {
      display: flex;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Vertical divider (row layout) */
    .divider.vertical {
      width: 6px;
      height: 100%;
      flex-shrink: 0;
      cursor: col-resize;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    /* Horizontal divider (column layout) */
    .divider.horizontal {
      width: 100%;
      height: 6px;
      flex-shrink: 0;
      cursor: row-resize;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .divider:hover, .divider.dragging { background: #f59e0b; }

    .divider-handle { pointer-events: none; background: #444; border-radius: 1px; }
    .divider.vertical   .divider-handle { width: 2px; height: 40px; }
    .divider.horizontal .divider-handle { width: 40px; height: 2px; }

    /* Transparent overlay prevents webviews from swallowing mouse during drag */
    #drag-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
    }
    #drag-overlay.active { display: block; }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="drag-overlay"></div>
  <script src="game.js"></script>
</body>
</html>
