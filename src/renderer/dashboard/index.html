<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'" />
  <title>Sunkist</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <h1 class="logo">SUNKIST</h1>
      <p class="section-label">SESSIONS</p>
      <ul id="session-list"></ul>
      <button id="btn-add">+ Add Session</button>
    </aside>
    <main id="main-panel">
      <section id="layout-section">
        <p class="section-label">LAYOUT</p>
        <div class="preset-row">
          <button class="preset-btn" data-preset="split-h-50">50/50 H</button>
          <button class="preset-btn" data-preset="split-v-50">50/50 V</button>
          <button class="preset-btn" data-preset="split-h-70">70/30 H</button>
          <button class="preset-btn" data-preset="split-v-70">70/30 V</button>
        </div>
        <button id="btn-apply">Apply Layout</button>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
